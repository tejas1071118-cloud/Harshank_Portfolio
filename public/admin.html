<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Harshank Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <script src="config.js"></script>
</head>
<body>

    <header id="admin-header">
        <div class="header-left">
            <a href="/" class="back-link">← Back to Portfolio</a>
            <h1>Admin Panel</h1>
        </div>
        <div class="header-stats" id="header-stats">
            <span class="stat"><span class="stat-num" id="stat-total">0</span> files</span>
            <span class="stat"><span class="stat-num" id="stat-images">0</span> images</span>
            <span class="stat"><span class="stat-num" id="stat-videos">0</span> videos</span>
        </div>
        <div class="header-right">
            <button id="btn-logout" class="btn-logout">Logout</button>
        </div>
    </header>

    <main id="admin-main">
        <!-- ========== UPLOAD SECTION ========== -->
        <section class="upload-section">
            <div class="upload-card">
                <h2>Upload Media</h2>
                <form id="upload-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="upload-title">Title</label>
                            <input type="text" id="upload-title" name="title" placeholder="e.g., Omtex Brand Reel #3">
                        </div>
                        <div class="form-group">
                            <label for="upload-category">Category</label>
                            <select id="upload-category" name="category">
                                <option value="photography">Photography</option>
                                <option value="video-editing">Video Editing</option>
                                <option value="fine-arts">Fine Arts</option>
                                <option value="hero-visual">Hero Visual</option>
                                <option value="featured-project">Featured Project</option>
                                <option value="uncategorized">Uncategorized</option>
                            </select>
                        </div>
                    </div>

                    <!-- Drag & Drop Zone -->
                    <div class="drop-zone" id="drop-zone">
                        <div class="drop-zone-content">
                            <div class="drop-icon">📁</div>
                            <p class="drop-primary">Drag & drop files here</p>
                            <p class="drop-secondary">or click to browse</p>
                            <p class="drop-formats">JPG, PNG, WebP, GIF, MP4, WebM, MOV — up to 100MB</p>
                        </div>
                        <input type="file" id="file-input" name="files" multiple accept="image/*,video/*" hidden>
                    </div>

                    <!-- Selected Files Preview -->
                    <div class="selected-files" id="selected-files"></div>

                    <!-- Upload Button -->
                    <button type="submit" class="btn-upload" id="btn-upload" disabled>
                        <span class="btn-text">Upload Files</span>
                        <span class="btn-loader" id="btn-loader"></span>
                    </button>
                </form>

                <!-- Upload Progress -->
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="progress-text" id="progress-text">Uploading...</span>
                </div>

                <!-- Toast -->
                <div class="toast" id="toast"></div>
            </div>
        </section>

        <!-- ========== MEDIA LIBRARY ========== -->
        <section class="library-section">
            <div class="library-header">
                <h2>Media Library</h2>
                <div class="library-filters">
                    <button class="lib-filter active" data-cat="all">All</button>
                    <button class="lib-filter" data-cat="photography">Photography</button>
                    <button class="lib-filter" data-cat="video-editing">Video Editing</button>
                    <button class="lib-filter" data-cat="fine-arts">Fine Arts</button>
                    <button class="lib-filter" data-cat="hero-visual">Hero Visual</button>
                    <button class="lib-filter" data-cat="featured-project">Featured Project</button>
                </div>
            </div>
            <div class="library-grid" id="library-grid">
                <p class="library-empty">No media uploaded yet. Use the upload form above to get started!</p>
            </div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
